<div class="login-wrap">
  <div class="login-card">

    <div class="login-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    </div>

    <h2>Panel Bancario</h2>
    <p>Gestión de Tarjetas de Crédito</p>

    <div *ngIf="errorMsg" class="alert-error">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
      {{ errorMsg }}
    </div>

    <div class="login-field">
      <label>Usuario</label>
      <input type="text" [(ngModel)]="username" placeholder="Ingresa tu usuario..." (keyup.enter)="login()"/>
    </div>

    <div class="login-field">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="login()"/>
    </div>

    <button [disabled]="loading" (click)="login()">
      {{ loading ? 'Autenticando...' : 'Iniciar Sesión' }}
    </button>

  </div>
</div>
