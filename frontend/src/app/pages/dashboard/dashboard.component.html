<div class="sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-header">
    <div class="brand-wrapper" *ngIf="!isCollapsed">
      <svg class="brand-icon" style="width:24px;height:24px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      <span class="brand-text">NexusBank</span>
    </div>
    <div class="brand-wrapper" *ngIf="isCollapsed">
      <svg class="brand-icon" style="width:24px;height:24px;flex-shrink:0;margin-left:auto;margin-right:auto;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <button type="button" class="toggle-btn" (click)="isCollapsed = !isCollapsed">
      <svg *ngIf="isCollapsed" class="toggle-icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      <svg *ngIf="!isCollapsed" class="toggle-icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
  </div>

  <div class="user-profile">
    <div class="avatar">{{ userInitial }}</div>
    <div class="user-info" *ngIf="!isCollapsed">
      <span class="user-name">{{ username }}</span>
      <span class="user-role">{{ role }}</span>
    </div>
  </div>

  <div class="nav-container">
    <span class="nav-title" *ngIf="!isCollapsed">Menú Principal</span>

    <a routerLink="/cards" routerLinkActive="active" class="nav-link">
      <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
      <span class="label" *ngIf="!isCollapsed">Mis Tarjetas</span>
    </a>


  </div>

  <div class="sidebar-footer">
    <button type="button" class="btn-logout" (click)="promptLogout()" title="Cerrar sesión">
      <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      <span class="label" *ngIf="!isCollapsed">Cerrar sesión</span>
    </button>
  </div>
</div>

<app-confirm-modal 
  *ngIf="showLogoutConfirm"
  title="Cerrar Sesión"
  message="¿Estás seguro de que deseas cerrar tu sesión actual?"
  confirmText="Cerrar sesión"
  cancelText="Cancelar"
  type="warning"
  (confirm)="logout()"
  (cancel)="cancelLogout()">
</app-confirm-modal>
